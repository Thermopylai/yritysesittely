<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/bootstrap.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Careeria Oy</title>
</head>
<body>
    <main class="container-md">
        <header class="d-flex flex-column align-items-center">
            <h1 class="mb-3">Careeria Oy</h1>
            <p>Tervetuloa yritysesittelyyn! Tässä näet tietoa yrityksestämme ja henkilökunnastamme.</p>
        </header>
        <hr />
        <div class="row">
            <section class="col-lg-3 col-md-4 col-sm-5 d-flex flex-column align-items-center">
                <nav class="navbar navbar-expand-sm navbar-dark shadow p-3 mb-5 bg-body rounded">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse mt-3" id="navbarNav">
                        <ul class="navbar-nav ms-auto flex-column align-items-center">
                            <li class="nav-item">
                                <button id="btn_yritysesittely" type="button" class="btn btn-outline-warning btn-lg mb-3" style="width:200px;">Yritysesittely</button>
                            </li>
                            <li class="nav-item">
                                <button id="btn_yhteystiedot" type="button" class="btn btn-outline-warning btn-lg mb-3" style="width:200px;">Yhteystiedot</button>
                            </li>
                            <li class="nav-item">
                                <button id="btn_henkilokunta" type="button" class="btn btn-outline-warning btn-lg mb-3" style="width:200px;">Henkilökunta</button>
                            </li>
                            <li class="nav-item dropdown">
                                <button class="btn btn-link dropdown-toggle d-flex align-items-center"
                                        id="bd-theme"
                                        type="button"
                                        data-bs-toggle="dropdown"
                                        data-bs-display="static"
                                        aria-expanded="false"
                                        aria-label="Toggle theme (auto)">
                                    <i class="bi-circle-half my-1"
                                        id="theme-icon-active"
                                        aria-hidden="true"></i>
                                    <span id="bd-theme-text" class="d-none">Toggle theme</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-start"
                                    aria-labelledby="bd-theme-text">
                                    <li>
                                        <button type="button"
                                                class="dropdown-item d-flex align-items-center"
                                                data-bs-theme-value="light"
                                                aria-pressed="false">
                                            <i class="bi-sun-fill me-2 opacity-50"
                                                id="theme-icon"
                                                aria-hidden="true"></i>
                                                Light
                                            <i class="bi-check2 ms-auto d-none"
                                                id="is-checked"
                                                aria-hidden="true"></i>
                                        </button>
                                    </li>
                                    <li>
                                        <button type="button"
                                                class="dropdown-item d-flex align-items-center"
                                                data-bs-theme-value="dark"
                                                aria-pressed="false">
                                            <i class="bi-moon-stars-fill me-2 opacity-50"
                                                id="theme-icon"
                                                aria-hidden="true"></i>
                                                Dark
                                            <i class="bi-check2 ms-auto d-none"
                                                id="is-checked"
                                                aria-hidden="true"></i>
                                        </button>
                                    </li>
                                    <li>
                                        <button type="button"
                                                class="dropdown-item d-flex align-items-center active"
                                                data-bs-theme-value="auto"
                                                aria-pressed="true">
                                            <i class="bi-circle-half me-2 opacity-50"
                                                id="theme-icon"
                                                aria-hidden="true"></i>
                                            Auto
                                            <i class="bi-check2 ms-auto"
                                                id="is-checked"
                                                aria-hidden="true"></i>
                                        </button>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </div>
                </nav>
            </section>
            <section id="main_area" class="col-lg-9 col-md-8 col-sm-7 d-flex flex-column align-items-center"></section>
        </div>
        <hr />
        <footer id="footer" class="d-flex flex-column align-items-center"></footer>
    </main>

    <script src="/js/main.js"></script>
    <!-- Bootstrap + Popper Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <!-- Oma JS public-kansiosta -->
    <script src="/js/theme-toggler.js"></script>
    <script src="/js/update-clock.js"></script>
</body>

</html>
